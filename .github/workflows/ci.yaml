name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        
      - name: Set up node
        uses: actions/setup-node@v4
        with: 
          node-version: 18

      - name: Node version
        run: (node --version)
